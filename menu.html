<!-- ================= BOTTOM BAR MODULE ================= -->
<style>
/* tránh bị page khác reset */
.bottom-bar, .bottom-bar *{
  box-sizing:border-box;
}

/* BAR */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:70px;
  background:#fff;

  display:flex;
  justify-content:space-around;
  align-items:center;

  padding:8px 0 6px;
  border-radius:18px 18px 0 0;

  box-shadow:0 -8px 25px rgba(0,0,0,.15);
  z-index:99999;
}

/* ITEM */
.bottom-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;

  font-size:11px;
  font-weight:700;
  color:#555;
  text-decoration:none;
}

/* ICON WRAP */
.bottom-icon{
  width:42px;
  height:42px;
  border-radius:14px;

  background:#f1f3f5;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* ICON IMG */
.bottom-icon img{
  width:22px;
  height:auto;
  display:block;
}

/* ACTIVE (để sẵn, sau này dùng JS gán) */
.bottom-item.active{
  color:#1e88ff;
}

.bottom-item.active .bottom-icon{
  background:#1e88ff;
  color:#fff;
}
</style>
